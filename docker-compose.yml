services:
  neuron-mv-control:
    build: .
    # For Portainer Git deployment you can instead publish an image and use:
    # image: ghcr.io/<your-user>/neuron-mv-control:latest
    container_name: neuron-mv-control
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Set a token to protect the admin API/page. Leave unset to keep admin open
      # (only do that on a trusted, isolated control network).
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      PORT: "8080"
      CONFIG_PATH: /data/config.json
      # Board transport. Neuron boards use HTTPS with a self-signed cert by default.
      BOARD_SCHEME: ${BOARD_SCHEME:-https}
      # BOARD_PORT: "443"                 # override if the API is on a nonstandard port
      # BOARD_WS_SCHEME: "wss"            # ws or wss; defaults to match BOARD_SCHEME
      # BOARD_WS_PORT: ""                 # override if the board WS is on a specific port
      # Set to "true" only if boards present a CA-trusted cert (rare on broadcast gear).
      BOARD_TLS_REJECT_UNAUTHORIZED: ${BOARD_TLS_REJECT_UNAUTHORIZED:-false}
    volumes:
      - neuron_config:/data

volumes:
  neuron_config:
