services:
  neuron-mv-control:
    build: .
    # For Portainer Git deployment you can instead publish an image and use:
    # image: ghcr.io/<your-user>/neuron-mv-control:latest
    container_name: neuron-mv-control
    restart: unless-stopped
    # Attached directly to the ipvlan/macvlan network below, so the container has its own LAN
    # IP (10.10.251.90). Serving on port 80 means the app is reached at http://10.10.251.90
    # (and the admin page at http://10.10.251.90/admin) with NO port number in the address.
    # On ipvlan/macvlan the container owns its whole port range, so binding 80 is free.
    networks:
      neuron_net:
        ipv4_address: 10.10.251.90
    environment:
      # Serve on the default HTTP port so the address needs no ":port" suffix.
      PORT: "80"
      # Timezone for the scheduled backup and file timestamps. Set to YOUR IANA zone so the
      # backup "time" field means local wall-clock time (e.g. 03:00 = 3 AM locally) rather
      # than UTC. Without this the container runs in UTC. DST is handled automatically.
      TZ: ${TZ:-America/New_York}
      # Admin access is a username/password stored (hashed) in config.json under
      # `admin: { user, passwordHash }`. Generate a hash with:
      #   node server/auth.js "yourpassword"
      CONFIG_PATH: /data/config.json
      # Board transport. Neuron boards use HTTPS with a self-signed cert by default.
      BOARD_SCHEME: ${BOARD_SCHEME:-https}
      # BOARD_PORT: "443"                 # override if the API is on a nonstandard port
      # Set to "true" only if boards present a CA-trusted cert (rare on broadcast gear).
      BOARD_TLS_REJECT_UNAUTHORIZED: ${BOARD_TLS_REJECT_UNAUTHORIZED:-false}
    volumes:
      - neuron_config:/data

networks:
  # This app shares the same L2 segment as the Companion stack (same subnet + parent eth0),
  # so it ATTACHES to that pre-existing network rather than defining a second one on the same
  # subnet (two networks can't both own 10.10.251.0/24 on the same parent — they'd conflict).
  #
  # `name:` must match the ACTUAL Docker network name as Portainer created it. Portainer
  # prefixes stack networks with the stack name, so the Companion stack's `companion_net`
  # is typically stored as `companion_companion_net`. Confirm under Portainer -> Networks
  # and set `name:` to whatever is listed there.
  neuron_net:
    external: true
    name: companion_companion_net

volumes:
  neuron_config:
