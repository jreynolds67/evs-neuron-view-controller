<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Neuron MV Snapshot Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="stage">
      <div class="stage-head">
        <h2 id="stageTitle">Select a card</h2>
        <span class="hint" id="stageHint"></span>
      </div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="actionbar">
      <div class="panelinfo">
        <div class="panelinfo-main">
          <span class="panelinfo-label" id="panelLabel">Neuron MV Control</span>
        </div>
        <div class="panelinfo-sub" id="panelSub">Locating panel…</div>
      </div>

      <div class="steps" id="steps">
        <div class="step" data-step="head"><span class="dot">1</span> Head</div>
        <span class="sep">›</span>
        <div class="step" data-step="snap"><span class="dot">2</span> Snapshot</div>
        <span class="sep">›</span>
        <div class="step" data-step="source"><span class="dot">3</span> Source</div>
        <span class="sep">›</span>
        <div class="step" data-step="confirm"><span class="dot">4</span> Confirm</div>
      </div>

      <div class="grow"></div>
      <div class="showall-slot" id="showAllSlot"></div>
      <div class="grow"></div>
      <button class="btn ghost" id="backBtn" disabled>Back</button>
      <button class="btn ghost" id="restartBtn">Start over</button>
    </div>
  </div>

  <!-- Confirm overlay -->
  <div class="overlay" id="overlay">
    <div class="sheet">
      <h3>Confirm snapshot recall</h3>
      <div class="confirm-lines" id="confirmLines"></div>
      <div class="row">
        <button class="btn ghost" id="cancelBtn">Cancel</button>
        <button class="btn arm" id="fireBtn">Load snapshot</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Fullscreen input-group editor (1080 only) -->
  <div class="fs-overlay" id="fsOverlay">
    <div class="fs-header">
      <div class="fs-title" id="fsTitle">Head</div>
      <div class="fs-hint">Tap a window to change its input</div>
      <div class="grow"></div>
      <button class="btn" id="fsClose">Close</button>
    </div>
    <div class="fs-body" id="fsBody"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
