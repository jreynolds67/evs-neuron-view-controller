<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Sign in — Neuron MV Control</title>
  <style>
    :root {
      --bg: #0e1116; --panel: #171c24; --panel-2: #1e2530; --line: #2a323d;
      --ink: #e6eaf0; --ink-dim: #9aa4b2; --ink-faint: #6b7480;
      --accent: #4c8dff; --danger: #e5484d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { width: 100%; max-width: 360px; background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 28px 24px; }
    h1 { margin: 0 0 4px; font-size: 18px; }
    .sub { margin: 0 0 20px; color: var(--ink-dim); font-size: 13px; }
    label { display: block; font-size: 12px; color: var(--ink-dim); margin: 14px 0 5px;
      text-transform: uppercase; letter-spacing: .04em; }
    input { width: 100%; background: var(--panel-2); border: 1px solid var(--line);
      border-radius: 8px; color: var(--ink); padding: 11px 12px; font-size: 15px; }
    input:focus { outline: none; border-color: var(--accent); }
    button { width: 100%; margin-top: 20px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; padding: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; }
    button:disabled { opacity: .6; cursor: default; }
    .err { margin-top: 14px; padding: 9px 11px; border-radius: 7px; font-size: 13px;
      background: color-mix(in srgb, var(--danger) 14%, var(--panel));
      border: 1px solid color-mix(in srgb, var(--danger) 45%, transparent);
      color: var(--ink); display: none; }
    .err.show { display: block; }
  </style>
</head>
<body>
  <form class="card" id="form" autocomplete="off">
    <h1>EVS Neuron View Control</h1>
    <label for="user">Username</label>
    <input id="user" name="user" type="text" autocapitalize="none" autocorrect="off" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>
    <button id="submit" type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const btn = document.getElementById('submit');
    function showErr(msg) { err.textContent = msg; err.classList.add('show'); }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show');
      btn.disabled = true;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: document.getElementById('user').value,
            password: document.getElementById('password').value,
          }),
        });
        const body = await res.json().catch(() => ({}));
        if (res.ok) { window.location.href = '/admin.html'; return; }
        showErr(body.error || 'Sign in failed.');
      } catch {
        showErr('Could not reach the server.');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
